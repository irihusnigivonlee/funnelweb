<!doctype html>
<html>
  <head>
    <title>Upload Ebook - FunnelWeb</title>

    <style>
      body {
        font-family: Arial;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
      }

      .container {
        background: white;
        width: 500px;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        animation: fadeIn 0.6s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      h2 {
        text-align: center;
        margin-bottom: 20px;
      }

      input,
      select {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
        border: 1px solid #ccc;
        border-radius: 6px;
      }

      .upload-area {
        border: 2px dashed #ccc;
        padding: 20px;
        text-align: center;
        border-radius: 8px;
        margin-top: 10px;
        cursor: pointer;
      }

      .upload-area:hover {
        border-color: #ff9800;
        background: #fff7e6;
      }

      button {
        width: 100%;
        padding: 12px;
        margin-top: 20px;
        background: #ff9800;
        border: none;
        color: white;
        font-weight: bold;
        border-radius: 6px;
        cursor: pointer;
      }

      button:hover {
        background: #e68900;
      }

      .progress {
        height: 8px;
        background: #eee;
        border-radius: 5px;
        overflow: hidden;
        margin-top: 10px;
      }

      .progress-bar {
        height: 100%;
        width: 0%;
        background: #ff9800;
      }

      .cover-preview {
        width: 120px;
        height: 160px;
        margin: auto;
        margin-top: 10px;
        border-radius: 6px;
        object-fit: cover;
        display: none;
      }
      .btn-linkvertise {
        display: block;
        width: 30%;
        padding: 12px;
        margin-top: 10px;
        text-align: center;
        background: rgb(6, 230, 250);
        color: black;
        font-weight: bold;
        border-radius: 6px;
        text-decoration: none;
        transition: 0.3s;
      }

      .btn-linkvertise:hover {
        background: #15803d;
        transform: translateY(-2px);
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>Upload Ebook</h2>
      <input type="text" name="creator" placeholder="Nama Creator" required />
      <input id="title" placeholder="Judul Ebook" />

      <input id="linkvertise" placeholder="Link Linkvertise (Affiliate)" />
      <div style="font-size: 12px; font-style: italic">
        &nbsp;&nbsp;&nbsp;Masukkan link file dari linkvertise terafiliasi
        FunnelWeb<span style="color: red; font-size: 20px">*</span>
      </div>
      <input id="website" placeholder="Website / Landing Page" />

      <input id="desc" placeholder="Deskripsi Ebook" />

      <select id="category">
        <option value="">Pilih Kategori</option>
        <option value="Motivasi">Motivasi</option>
        <option value="Bisnis">Bisnis</option>
        <option value="Teknologi">Teknologi</option>
        <option value="Edukasi">Edukasi</option>
        <option value="Novel">Novel</option>
        <option value="Cerpen">Cerpen</option>
      </select>

      <div
        class="upload-area"
        onclick="document.getElementById('file').click()"
      >
        📘 Klik untuk pilih File Ebook (PDF)
        <input type="file" id="file" hidden accept=".pdf" />
      </div>

      <div
        class="upload-area"
        onclick="document.getElementById('cover').click()"
      >
        🖼 Klik untuk pilih Cover
        <input
          type="file"
          id="cover"
          hidden
          accept="image/*"
          onchange="previewCover(event)"
        />
      </div>

      <img id="coverPreview" class="cover-preview" />

      <button onclick="upload()">Upload Ebook</button>

      <a
        href="https://linkvertise.com/?publisherClosed=true&affiliate_id=1314520"
        target="_blank"
        class="btn-linkvertise"
      >
        Daftar Linkvertise Gratis <span style="color: red">*</span>
      </a>
      <div class="progress">
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </div>

    <script>
      const AFFILIATE_CODE = "1314520";

      function previewCover(event) {
        const img = document.getElementById("coverPreview");

        img.src = URL.createObjectURL(event.target.files[0]);

        img.style.display = "block";
      }

      function validAffiliate(link) {
        const regex = new RegExp(
          `^https:\\/\\/(linkvertise\\.com|direct-link\\.net|link-to\\.net)\\/${AFFILIATE_CODE}\\/`,
          "i",
        );

        return regex.test(link);
      }

      function upload() {
        const title = document.getElementById("title").value.trim();
        const linkvertise = document.getElementById("linkvertise").value.trim();
        const website = document.getElementById("website").value.trim();
        const desc = document.getElementById("desc").value.trim();
        const category = document.getElementById("category").value;

        const file = document.getElementById("file").files[0];
        const cover = document.getElementById("cover").files[0];

        if (!title || !linkvertise || !file || !cover) {
          alert("Lengkapi semua data");

          return;
        }

        if (!validAffiliate(linkvertise)) {
          alert("Gunakan link affiliate Linkvertise yang valid");

          return;
        }

        if (file.type !== "application/pdf") {
          alert("File ebook harus PDF");

          return;
        }

        if (!cover.type.startsWith("image")) {
          alert("Cover harus berupa gambar");

          return;
        }

        const formData = new FormData();

        formData.append("title", title);
        formData.append("linkvertise", linkvertise);
        formData.append("website", website);
        formData.append("desc", desc);
        formData.append("category", category);
        formData.append("file", file);
        formData.append("cover", cover);

        const xhr = new XMLHttpRequest();

        xhr.open("POST", "/upload-ebook", true);

        xhr.upload.onprogress = function (e) {
          if (e.lengthComputable) {
            const percent = (e.loaded / e.total) * 100;

            document.getElementById("progressBar").style.width = percent + "%";
          }
        };

        xhr.onload = function () {
          try {
            const res = JSON.parse(xhr.responseText);

            if (xhr.status === 200) {
              alert(res.message || "Upload berhasil");

              location.href = "/";
            } else {
              alert(res.message || "Upload gagal");
            }
          } catch (err) {
            alert("Server error");
          }
        };

        xhr.send(formData);
      }
    </script>
  </body>
</html>
