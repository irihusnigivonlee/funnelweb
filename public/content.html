<!doctype html>
<html>
  <head>
    <title>FunnelWeb Content</title>

    <style>
      body {
        font-family: Arial;
        background: #0f172a;
        color: white;
        margin: 0;
        padding: 30px;
      }

      .container {
        max-width: 900px;
        margin: auto;
      }

      img {
        width: 100%;
        border-radius: 10px;
      }

      video {
        width: 100%;
        border-radius: 10px;
      }

      .btn {
        margin-top: 20px;
        padding: 12px 25px;
        background: #22c55e;
        border: none;
        border-radius: 8px;
        color: white;
        font-weight: bold;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div class="container" id="content"></div>

    <script>
      const params = new URLSearchParams(window.location.search);

      const id = params.get("id");
      const type = params.get("type");

      const api = type === "video" ? "/videos" : "/ebooks";

      fetch(api)
        .then((res) => res.json())

        .then((data) => {
          const item = data.find((i) => i.id == id);

          if (!item) {
            document.getElementById("content").innerHTML =
              "Konten tidak ditemukan";

            return;
          }

          let html = "";

          if (type === "video") {
            html = `

<h1>${item.title}</h1>

<img src="${item.thumb}">

<br><br>

<video 
controls 
controlsList="nodownload"
oncontextmenu="return false"
style="width:100%"
>

<source src="${item.video}" type="video/mp4">

</video>

<br>

<a href="/video-download/${item.id}">
<button class="btn">⬇ Download</button>
</a>

<br>

<a href="${item.website}" target="_blank">

<button class="btn">🌐 Kunjungi Website Creator</button>

</a>

<br><br>

<a href="/creator.html?name=${item.creator}">

<button class="btn">👤 Lihat Creator</button>

</a>

`;
          } else {
            html = `

<h1>${item.title}</h1>

<img src="/uploads/cover/${item.cover}">

<p>${item.desc}</p>

<a href="/ebook-download/${item.id}">

<button class="btn">⬇ Download Ebook</button>

</a>

<br><br>

<a href="${item.website}" target="_blank">

<button class="btn">🌐 Website Creator</button>

</a>

<br><br>

<a href="/creator.html?name=${item.creator}">

<button class="btn">👤 Lihat Creator</button>

</a>

`;
          }

          document.getElementById("content").innerHTML = html;
        });
    </script>
  </body>
</html>
